name: Build & Deploy Resumes
on:
  push: { branches: [main] }
  workflow_dispatch:
permissions: { contents: read, pages: write, id-token: write }
concurrency: { group: "pages", cancel-in-progress: true }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile LaTeX variants
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            variants/general.tex
            variants/writer.tex
            variants/datadog.tex
            variants/terzo.tex
            variants/garner.tex
            variants/opencall.tex
            variants/rogo.tex
            variants/anthropic.tex
            variants/openai.tex
            variants/dioptra.tex
            variants/google.tex
            variants/humanize.tex
            variants/stubhub.tex
            variants/basis.tex
            variants/exacare.tex
            variants/elise.tex
            variants/ellis.tex
            variants/frontier-labs.tex
            variants/openai-fde.tex
            variants/anthropic-devprod-cicd.tex
            variants/cursor-agent-harness.tex
            variants/vercel-ai-gateway.tex
            variants/openai-agent-infra.tex
            variants/github-ai-enablement.tex
            variants/google-platform-infra.tex
            variants/figma-ai-product.tex
            variants/anthropic-computer-use.tex
            variants/reddit-genai-platform.tex
            variants/nvidia-ai-inference.tex
            variants/bloomberg-ai-assistant.tex
            variants/outer-signal.tex
            variants/monstro.tex
            variants/american-express-agentic-ai.tex
            variants/alterion-fde.tex
            variants/honk-fullstack.tex
            variants/headway.tex
            variants/wealth-ai-infra-platform.tex
            variants/browserbase-core-infra.tex
            variants/poetic-fde.tex
            variants/netic-product-infra.tex
            variants/whop-engineering.tex
            variants/vts-activate.tex
            variants/tribe-ai-fde.tex
            variants/standard-bots-platform-infra.tex
            variants/vertical-ai-supply.tex
            variants/bluefish-ai.tex
            variants/paces-ai-engineer.tex
            variants/goldman-agent-deployment.tex
            variants/quilr-network-proxy.tex
            variants/kforce-private-markets-ai.tex
            variants/pumpfun-backend.tex
            variants/stackadapt-user-profile.tex
            variants/stackadapt-agentic-orchestration.tex
            variants/assured-guaranty-ai-software-engineer.tex
            variants/deshaw-genai-product-development.tex
            variants/deshaw-appeng-infrastructure.tex
            variants/optiver-ai-developer-platform.tex
            variants/pdt-senior-platform.tex
      - name: Smoke-test resumes
        run: |
          python3 -m pip install --quiet pypdf
          python3 web/test_resumes.py
      - name: Assemble site
        run: |
          set -e
          mkdir -p site
          for v in variants/*.tex; do
            n=$(basename "$v" .tex)
            [ -f "$n.pdf" ] && cp "$n.pdf" "site/resume-$n.pdf"
          done
          python3 web/gen_index.py site > site/index.html
          cp web/style.css site/ 2>/dev/null || true
          cp web/loss-descent.html site/loss-descent.html
      - uses: actions/upload-pages-artifact@v3
        with: { path: site }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: { name: github-pages, url: "${{ steps.dep.outputs.page_url }}" }
    steps:
      - id: dep
        uses: actions/deploy-pages@v4
